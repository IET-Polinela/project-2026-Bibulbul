<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga — Smart City Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --sc-bg-1: #020617;
            --sc-bg-2: #0f172a;
            --sc-bg-3: #111827;
            --sc-card: rgba(15, 23, 42, 0.86);
            --sc-card-soft: rgba(30, 41, 59, 0.92);
            --sc-border: rgba(148, 163, 184, 0.18);
            --sc-primary: #2563eb;
            --sc-primary-soft: #3b82f6;
            --sc-cyan: #38bdf8;
            --sc-success: #22c55e;
            --sc-warning: #f59e0b;
            --sc-danger: #ef4444;
            --sc-text: #f8fafc;
            --sc-soft: #cbd5e1;
            --sc-muted: #94a3b8;
            --sc-radius: 18px;
            --sc-shadow: 0 18px 55px rgba(0, 0, 0, 0.36);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--sc-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.32), transparent 34%),
                radial-gradient(circle at top right, rgba(56, 189, 248, 0.18), transparent 30%),
                linear-gradient(145deg, var(--sc-bg-1), var(--sc-bg-2) 45%, var(--sc-bg-3));
            background-attachment: fixed;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.48), transparent 78%);
        }

        body::after {
            content: "";
            position: fixed;
            width: 420px;
            height: 420px;
            right: -180px;
            bottom: -160px;
            border-radius: 999px;
            background: rgba(59, 130, 246, 0.16);
            filter: blur(20px);
            z-index: -1;
            pointer-events: none;
        }

        .navbar {
            background: rgba(2, 6, 23, 0.78) !important;
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--sc-border);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.26);
        }

        .navbar .container-fluid {
            min-height: 66px;
        }

        .navbar-brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #ffffff !important;
            letter-spacing: 0.2px;
        }

        .navbar-brand i {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--sc-primary), var(--sc-cyan));
            box-shadow: 0 12px 28px rgba(37, 99, 235, 0.34);
        }

        #nav-menus {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #nav-menus a,
        #nav-menus button {
            border-radius: 999px !important;
            font-weight: 700;
        }

        .spa-container {
            min-height: calc(100vh - 142px);
            position: relative;
        }

        #app-content {
            animation: fadeUp 0.35s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #toast-container {
            position: fixed;
            top: 82px;
            right: 22px;
            z-index: 9999;
            min-width: 300px;
        }

        .card {
            background: linear-gradient(180deg, var(--sc-card-soft), var(--sc-card)) !important;
            color: var(--sc-text) !important;
            border: 1px solid var(--sc-border) !important;
            border-radius: var(--sc-radius) !important;
            box-shadow: var(--sc-shadow);
            backdrop-filter: blur(16px);
            transition:
                transform 0.18s ease,
                box-shadow 0.18s ease,
                border-color 0.18s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: rgba(96, 165, 250, 0.45) !important;
            box-shadow: 0 22px 65px rgba(0, 0, 0, 0.43);
        }

        .card-header,
        .card-footer {
            background: rgba(15, 23, 42, 0.58) !important;
            border-color: var(--sc-border) !important;
        }

        .card h1,
        .card h2,
        .card h3,
        .card h4,
        .card h5,
        .card h6,
        .card p,
        .card small,
        .card span {
            color: var(--sc-text) !important;
        }

        .text-muted {
            color: var(--sc-muted) !important;
        }

        .text-dark {
            color: #0f172a !important;
        }

        a {
            color: #93c5fd;
        }

        a:hover {
            color: #bfdbfe;
        }

        hr {
            border-color: var(--sc-border);
            opacity: 1;
        }

        label {
            color: var(--sc-soft);
            font-weight: 650;
            margin-bottom: 6px;
        }

        .form-control,
        .form-select,
        textarea,
        input,
        select {
            min-height: 44px;
            background-color: rgba(2, 6, 23, 0.72) !important;
            color: var(--sc-text) !important;
            border: 1px solid rgba(96, 165, 250, 0.38) !important;
            border-radius: 12px !important;
            transition:
                border-color 0.18s ease,
                box-shadow 0.18s ease,
                background-color 0.18s ease;
        }

        .form-control::placeholder,
        textarea::placeholder,
        input::placeholder {
            color: #64748b !important;
        }

        .form-control:focus,
        .form-select:focus,
        textarea:focus,
        input:focus,
        select:focus {
            background-color: rgba(15, 23, 42, 0.96) !important;
            border-color: var(--sc-cyan) !important;
            box-shadow: 0 0 0 0.22rem rgba(56, 189, 248, 0.18) !important;
            color: #ffffff !important;
        }

        select option {
            background: #0f172a;
            color: #f8fafc;
        }

        .btn {
            border-radius: 12px !important;
            font-weight: 700;
            transition:
                transform 0.18s ease,
                box-shadow 0.18s ease,
                opacity 0.18s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary,
        .btn-success {
            border: none !important;
            background: linear-gradient(135deg, var(--sc-primary), var(--sc-cyan)) !important;
            color: #ffffff !important;
            box-shadow: 0 12px 28px rgba(37, 99, 235, 0.28);
        }

        .btn-primary:hover,
        .btn-success:hover {
            box-shadow: 0 16px 36px rgba(37, 99, 235, 0.38);
        }

        .btn-outline-secondary {
            color: #cbd5e1 !important;
            border-color: rgba(148, 163, 184, 0.35) !important;
            background: rgba(15, 23, 42, 0.45) !important;
        }

        .btn-outline-secondary:hover {
            color: #ffffff !important;
            background: rgba(148, 163, 184, 0.18) !important;
            border-color: rgba(203, 213, 225, 0.55) !important;
        }

        .btn-danger {
            border: none !important;
            background: linear-gradient(135deg, #dc2626, #f97316) !important;
            color: #ffffff !important;
        }

        .badge {
            border-radius: 999px;
            padding: 0.45rem 0.7rem;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .badge.bg-secondary {
            background: rgba(148, 163, 184, 0.22) !important;
            color: #e2e8f0 !important;
            border: 1px solid rgba(148, 163, 184, 0.25);
        }

        .badge.bg-primary {
            background: rgba(59, 130, 246, 0.24) !important;
            color: #bfdbfe !important;
            border: 1px solid rgba(59, 130, 246, 0.32);
        }

        .badge.bg-success {
            background: rgba(34, 197, 94, 0.20) !important;
            color: #bbf7d0 !important;
            border: 1px solid rgba(34, 197, 94, 0.28);
        }

        .badge.bg-warning {
            background: rgba(245, 158, 11, 0.20) !important;
            color: #fde68a !important;
            border: 1px solid rgba(245, 158, 11, 0.28);
        }

        .badge.bg-danger {
            background: rgba(239, 68, 68, 0.20) !important;
            color: #fecaca !important;
            border: 1px solid rgba(239, 68, 68, 0.28);
        }

        .nav-link-side {
            color: var(--sc-soft) !important;
            border-radius: 12px;
            padding: 10px 13px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 9px;
            transition: 0.18s ease;
        }

        .nav-link-side:hover,
        .nav-link-side.active {
            background: rgba(59, 130, 246, 0.18);
            color: #ffffff !important;
            transform: translateX(3px);
        }

        .list-group-item {
            background: rgba(15, 23, 42, 0.72) !important;
            color: var(--sc-text) !important;
            border-color: var(--sc-border) !important;
        }

        .alert {
            border-radius: 14px;
            border: 1px solid var(--sc-border);
            box-shadow: 0 14px 35px rgba(0, 0, 0, 0.22);
        }

        .alert-info,
        .alert-primary {
            background: rgba(59, 130, 246, 0.14) !important;
            color: #dbeafe !important;
            border-color: rgba(59, 130, 246, 0.28) !important;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.14) !important;
            color: #dcfce7 !important;
            border-color: rgba(34, 197, 94, 0.28) !important;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.14) !important;
            color: #fee2e2 !important;
            border-color: rgba(239, 68, 68, 0.28) !important;
        }

        .modal-backdrop.show {
            opacity: 0.72;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background:
                linear-gradient(180deg, rgba(30, 41, 59, 0.98), rgba(15, 23, 42, 0.98)) !important;
            color: var(--sc-text) !important;
            border: 1px solid rgba(148, 163, 184, 0.22) !important;
            border-radius: 22px !important;
            box-shadow: 0 26px 80px rgba(0, 0, 0, 0.55);
            overflow: hidden;
        }

        .modal-header {
            background: linear-gradient(135deg, var(--sc-primary), #1d4ed8, #0ea5e9) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12) !important;
            padding: 1.15rem 1.35rem;
        }

        .modal-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-body {
            background:
                radial-gradient(circle at top right, rgba(56, 189, 248, 0.10), transparent 35%),
                rgba(15, 23, 42, 0.76);
        }

        .btn-close-white {
            filter: invert(1) grayscale(100%) brightness(200%);
            opacity: 0.85;
        }

        .page-link {
            margin: 0 3px;
            background-color: rgba(15, 23, 42, 0.82) !important;
            color: #93c5fd !important;
            border-color: var(--sc-border) !important;
            border-radius: 10px !important;
        }

        .page-link:hover {
            background-color: rgba(59, 130, 246, 0.20) !important;
            color: #ffffff !important;
        }

        .page-item.active .page-link {
            background: linear-gradient(135deg, var(--sc-primary), var(--sc-cyan)) !important;
            border-color: transparent !important;
            color: #ffffff !important;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.28);
        }

        .page-item.disabled .page-link {
            background-color: rgba(15, 23, 42, 0.45) !important;
            color: #64748b !important;
        }

        .progress {
            height: 10px;
            background-color: rgba(2, 6, 23, 0.8) !important;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--sc-primary), var(--sc-cyan)) !important;
        }

        table {
            color: var(--sc-text) !important;
        }

        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--sc-text);
            --bs-table-border-color: var(--sc-border);
            color: var(--sc-text) !important;
        }

        .table th {
            color: #dbeafe !important;
            font-weight: 700;
            border-bottom-color: rgba(96, 165, 250, 0.35) !important;
        }

        .table td {
            color: var(--sc-soft) !important;
        }

        footer {
            color: var(--sc-muted);
            border-top: 1px solid var(--sc-border) !important;
            background: rgba(2, 6, 23, 0.38);
            backdrop-filter: blur(12px);
        }

        ::selection {
            background: rgba(56, 189, 248, 0.35);
            color: #ffffff;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #020617;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(96, 165, 250, 0.42);
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(96, 165, 250, 0.65);
        }

        @media (max-width: 768px) {
            .navbar .container-fluid {
                padding-left: 16px !important;
                padding-right: 16px !important;
            }

            .navbar-brand {
                font-size: 1rem;
            }

            .navbar-brand i {
                width: 32px;
                height: 32px;
            }

            #nav-menus {
                gap: 6px;
                flex-wrap: wrap;
                justify-content: flex-end;
            }

            .spa-container {
                padding-left: 14px !important;
                padding-right: 14px !important;
            }

            #toast-container {
                left: 14px;
                right: 14px;
                min-width: unset;
            }

            .modal-dialog {
                margin: 0.75rem;
            }

            .modal-body {
                padding: 1.15rem !important;
            }

            .btn {
                font-size: 0.92rem;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-buildings-fill me-2"></i>
                Smart City Portal
            </a>

            <div id="nav-menus" class="ms-auto"></div>
        </div>
    </nav>

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <!-- Konten utama SPA -->
    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <!-- Footer -->
    <footer class="text-center text-muted py-3 mt-4 border-top small">
        Smart City Portal &copy; 2026 — PIE 1416 Teknologi Rekayasa Internet
    </footer>

    <!-- Modal Form Laporan -->
    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>
                        Buat Laporan Baru
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body p-4">
                    <form id="reportForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Judul</label>
                            <input
                                type="text"
                                id="inputTitle"
                                class="form-control"
                                placeholder="Judul laporan"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Kategori</label>
                            <select id="inputCategory" class="form-control">
                                <option value="Infrastruktur">Infrastruktur</option>
                                <option value="Kebersihan">Kebersihan</option>
                                <option value="Fasilitas Umum">Fasilitas Umum</option>
                                <option value="Keamanan">Keamanan</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Deskripsi</label>
                            <textarea
                                id="inputDescription"
                                class="form-control"
                                rows="3"
                                placeholder="Jelaskan masalah yang terjadi secara detail"
                            ></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Lokasi</label>
                            <input
                                type="text"
                                id="inputLocation"
                                class="form-control"
                                placeholder="Alamat atau nama lokasi kejadian"
                            >
                        </div>

                        <div class="d-flex justify-content-end mt-4 gap-2">
                            <button type="button" class="btn btn-outline-secondary fw-bold px-4" id="btnDraft">
                                <i class="bi bi-save me-1"></i>
                                Simpan Draft
                            </button>

                            <button type="button" class="btn btn-primary fw-bold px-4" id="btnSubmit">
                                Ajukan
                                <i class="bi bi-send-fill ms-1"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
