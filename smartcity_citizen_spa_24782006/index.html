<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga - Smart City Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (wajib, bukan emoji!) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body { background-color: #f4f6f9; }
        .spa-container { min-height: calc(100vh - 80px); }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-buildings-fill me-2"></i>Smart City Portal
            </a>
            <div id="nav-menus" class="ms-auto"></div>
        </div>
    </nav>

    <!-- Konten utama SPA -->
    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <!-- Modal Form Laporan -->
    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>Buat Laporan Baru
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="reportForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Judul</label>
                            <input type="text" id="fieldTitle" class="form-control" placeholder="Judul laporan" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Kategori</label>
                            <input type="text" id="fieldCategory" class="form-control" placeholder="Contoh: Jalan, Sampah, dll">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Deskripsi</label>
                            <textarea id="fieldDescription" class="form-control" rows="3" placeholder="Jelaskan masalah yang terjadi"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Lokasi</label>
                            <input type="text" id="fieldLocation" class="form-control" placeholder="Alamat/lokasi kejadian">
                        </div>
                        <div class="d-flex justify-content-end mt-4 gap-2">
                            <button type="button" class="btn btn-outline-secondary fw-bold px-4" id="btnDraft">
                                Simpan Draft
                            </button>
                            <button type="button" class="btn btn-primary fw-bold px-4" id="btnSubmit">
                                Ajukan <i class="bi bi-send-fill ms-1"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (wajib untuk modal) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
